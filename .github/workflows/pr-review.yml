name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Get PR Diff
        id: get_diff
        run: |
          git diff HEAD^ HEAD > diff.txt
          echo "PR_DIFF<<EOF" >> $GITHUB_ENV
          cat diff.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run Groq Review Script
        id: groq_review
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python review_pr.py

      - name: Verify Review File Exists
        id: check_file
        run: |
          if [ -s "pr_review.md" ]; then
            echo "file_exists=true" >> $GITHUB_OUTPUT
          else
            echo "file_exists=false" >> $GITHUB_OUTPUT
            echo "Error: pr_review.md is empty or does not exist. The Python script might have crashed."
          fi

      - name: Post Comment to PR
        # Using a modern, fully up-to-date action to avoid Node 20 deprecation warnings
        if: steps.check_file.outputs.file_exists == 'true'
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: pr_review.md
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Handle Script Failure or Critical Errors
        # Close if the python script returned exit code 1 OR if it crashed completely without writing a file
        if: steps.groq_review.outcome == 'failure' || steps.check_file.outputs.file_exists == 'false'
        run: |
          if [ "${{ steps.check_file.outputs.file_exists }}" = "false" ]; then
            REASON="The AI code review workflow encountered an internal error or failed to connect to the model."
          else
            REASON="Closing automatically due to critical errors detected during AI review."
          fi
          gh pr close ${{ github.event.pull_request.number }} -c "$REASON"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
