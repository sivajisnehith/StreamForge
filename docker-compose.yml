services:
  postgres:
    image: postgres:17
    container_name: streamforge-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: streamforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: streamforge-rabbitmq
    restart: unless-stopped

    ports:
      - "5672:5672"     # Spring Boot ↔ RabbitMQ
      - "15672:15672"   # RabbitMQ Management UI

    environment:
      RABBITMQ_DEFAULT_USER: streamforge
      RABBITMQ_DEFAULT_PASS: streamforge_pass

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio
    container_name: streamforge-minio
    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    command: server /data --console-address ":9001"

    ports:
      - "9000:9000"     # MinIO API
      - "9001:9001"     # MinIO Console

    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data: